<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Список статей</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<!-- Навигационная панель -->
<nav class="navbar navbar-expand-lg navbar-light bg-light mb-3">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">Articles</a>
        <div class="d-flex">
            <form th:action="@{/logout}" method="post">
                <button type="submit" class="btn btn-outline-danger">Выйти</button>
            </form>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <div class="card shadow p-4">
        <h2 class="text-center mb-4">Список статей</h2>
        <table class="table table-bordered table-striped">
            <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Заголовок</th>
                <th>Описание</th>
                <th>Автор</th>
                <th>Жанры</th>
                <th>Создана</th>
                <th>Обновлена</th>
                <th>Действия</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="article : ${articles}">
                <td th:text="${article.id}"></td>
                <td th:text="${article.title}"></td>
                <td th:text="${article.description}"></td>
                <td th:text="${article.author.name}"></td>
                <!-- Вывод тегов (жанров) -->
                <td>
                    <span th:each="tag, iterStat : ${article.tags}"
                          th:text="${tag.name + (iterStat.last ? '' : ', ')}"></span>
                </td>
                <td th:text="${article.createdAt}"></td>
                <td th:text="${article.updatedAt}"></td>
                <td>
                    <a th:href="@{/articles/{id}(id=${article.id})}" class="btn btn-info btn-sm">Детали</a>
                    <span th:if="${#authentication.principal.username == article.owner.username or #authorization.expression('hasRole(''ADMIN'')')}">
                        <a th:href="@{/articles/edit/{id}(id=${article.id})}" class="btn btn-warning btn-sm">Редактировать</a>
                        <a th:href="@{/articles/delete/{id}(id=${article.id})}" class="btn btn-danger btn-sm"
                        onclick="return confirm('Вы уверены, что хотите удалить статью?')">Удалить</a>
                    </span>
                </td>
            </tr>
            </tbody>
        </table>
        <div class="text-center mt-3">
            <a href="/articles/new" class="btn btn-success">Добавить новую статью</a>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
